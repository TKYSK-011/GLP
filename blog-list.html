    <!-- ★ YouTube oEmbed APIでタイトルを自動取得 -->
    <script>
            (function () {
                const titleElements = document.querySelectorAll('[data-youtube-title]');
                const cache = {};

                titleElements.forEach(el => {
                    const videoId = el.getAttribute('data-youtube-title');
                    if (!videoId) return;

                    if (cache[videoId]) {
                        cache[videoId].then(title => {
                            el.textContent = title;
                        });
                        return;
                    }

                    cache[videoId] = fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`)
                        .then(res => res.json())
                        .then(data => {
                            el.textContent = data.title;
                            return data.title;
                        })
                        .catch(() => {
                            el.textContent = 'タイトルを取得できませんでした';
                            return '';
                        });
                });
            })();
    </script>
